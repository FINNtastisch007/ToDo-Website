<body>
    <input type="range" class="slider" id="slider" min="0" max="1000" value="50" step="50">
    <div id="content">
        <h1 id="xp_count">50xp</h1>
    </div>
</body>

<link rel="stylesheet" href="styles.css">
<!-- <link rel="stylesheet" href="https://p.trellocdn.com/power-up.css" /> -->
<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
const t = window.TrelloPowerUp.iframe();

const slider = document.getElementById("slider");
const xp_count = document.getElementById("xp_count");

async function xpGet() {
            let xp = await t.get("card", "shared", "xp", "No xp set yet...");
            xp_count.textContent = xp + ((xp!="No xp set yet...") ? "xp" : "");
            slider.value = xp;
};

xpGet();

slider.oninput = async () => {
    xp_count.textContent = slider.value + "xp";

    await t.set("card", "shared", "xp", slider.value);
};
</script>
