<body>
    <link rel="stylesheet" href="styles.css">
    <span id="xp_count">No xp set yet...</span>
    <button id="button">change XP</button>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        const xp_count = document.getElementById("xp_count");

        const t = window.TrelloPowerUp.iframe();

        async function xpGet() {
            let xp = await t.get("card", "shared", "priority", "No xp set yet...");
            xp_count.textContent = xp;
        };

        document.getElementById("button").addEventListener("click", function (e) {
            t.popup({
                title: "XP einstellen",
                url: "./slider.html",
                height: 120,
                mouseEvent: e
            });
        });

        xpGet();

    </script>
</body>
