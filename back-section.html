<body>
    <link rel="stylesheet" href="styles.css">
    <span id="xp_count">No xp set yet</span>

    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        const xp_count = document.getElementById("xp_count");
        const t = TrelloPowerUp.iframe();
        let xp = t.get("card", "shared", "priority", "No xp set yet");
        xp_count.textContent = xp;
    </script>
</body>
