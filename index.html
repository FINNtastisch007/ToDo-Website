<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- <link rel="stylesheet" href="styles.css"> -->
    <title>ToDo</title>
</head>

<body>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        TrelloPowerUp.initialize({
            'card-buttons': function (t, options) {
                return [
                    {
                        icon: './XP.svg',
                        text: "xp-ToDo",
                        callback: function (t) {
                            return t.popup({
                                title: 'xp einstellen',
                                url: './slider.html',
                                height: 120
                            });
                        }
                    }
                ]
            },

            'card-back-section': function (t) {
                return {
                    icon: './XP.svg',
                    title: 'xp-ToDo',
                    content: {
                        type: 'iframe',
                        url: t.signUrl('./back-section.html'),
                        height: 80
                    }
                };
            },

            'board-buttons': function (t, opts) {
                return [{
                    // we can either provide a button that has a callback function
                    icon: './XP.svg',
                    text: 'xp-ToDo',
                    callback: function(t) {
                        return t.modal({
                            url: "./overview.html",
                            fullscreen: true,
                            title: "xp-ToDo",
                        })
                    },
                    condition: 'edit'
                }]
            }
        });
    </script>
</body>

</html>
