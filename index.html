<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ToDo</title>
</head>
<body>
    <script src="https://p.trellocdn.com/power-up.min.js"></script>
    <script>
        TrelloPowerUp.initialize({
            'card-buttons': function(t, options) {
                return [
                    {
                        text: "xp-ToDo",
                        callback: function (t) {
                            return t.popup({
                            title: 'xp einstellen',
                            url: './slider.html',
                            height: 120
                            });
                        }
                    }
                ]
            },

            'card-back-section': function(t) {
                return {
                title: 'xp-ToDO',
                content: {
                    type: 'iframe',
                    url: './back-section.html',
                    height: 80
                }
                };
            }
        })
    </script>
</body>
</html>
