<body>
    <h1 id="total_xp_count">0xp</h1>
</body>

<link rel="stylesheet" href="styles.css">

<script src="https://p.trellocdn.com/power-up.min.js"></script>
<script>
    const t = window.TrelloPowerUp.iframe();
    const total_xp_count = document.getElementById("total_xp_count");

    async function getCompletedXp() {
        const cards = await t.cards("all");

        let totalXp = 0;

        for (const card of cards) {
            console.log(`https://api.trello.com/1/cards/${card.id}?key=de854d2dfce7b139b90484b2b7c4e7c1&token=ATTA1acd7fe3b427273d02f8b45acf48d11a2be9e054b3f6c69b96e170014f931087F06E65AE&fields=all`);
            const response = await fetch(
                `https://api.trello.com/1/cards/${card.id}?key=de854d2dfce7b139b90484b2b7c4e7c1&token=ATTA1acd7fe3b427273d02f8b45acf48d11a2be9e054b3f6c69b96e170014f931087F06E65AE&fields=all`
            );

            const card_data = await response.json();

            console.log(card_data);
            console.log(card_data.dateCompleted);
            console.log(card);
            console.log(card.id);
            console.log(card.dueComplete);
            if (!card.dueComplete) continue;

            const completed = new Date(card_data.dateCompleted);

            const today = new Date();

            const isToday =
                completed.getFullYear() === today.getFullYear() &&
                completed.getMonth() === today.getMonth() &&
                completed.getDate() === today.getDate();

            if (!isToday) continue;

            const xp = await t.get(card.id, "shared", "xp");

            totalXp += Number(xp || 0);
        }

        return totalXp;
    }

    getCompletedXp().then(total => {
        console.log("Gesamt-XP:", total);
        total_xp_count.textContent = total + "xp";

    });
</script>
